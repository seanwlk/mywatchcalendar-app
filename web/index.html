<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TV Series Watchlist and upcoming calendar">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MyWatchCalendar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MyWatchCalendar</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Default dark html to avoid being flashbanged at night */
    body {
      background-color: #000000;
      color: white;
      margin: 0;
      padding: 0;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      transition: opacity 250ms ease-out;
    }
    #loading.done { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #40c4ff;   /* matches the default amoledBlue accent */
      border-radius: 50%;
      animation: spin 900ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #loading .spinner { animation-duration: 3s; }
    }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div></div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (!el) return;
      el.classList.add('done');
      setTimeout(function () { el.remove(); }, 300);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
